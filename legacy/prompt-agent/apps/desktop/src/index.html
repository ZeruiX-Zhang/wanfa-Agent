<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PromptAgent</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">PA</div>
          <div>
            <strong>PromptAgent</strong>
            <span>Desktop</span>
          </div>
        </div>
        <nav class="workspace-nav" aria-label="主工作区">
          <button class="nav-item active" data-workspace="prompt">提示词实验室</button>
          <button class="nav-item" data-workspace="knowledge">知识系统</button>
          <button class="nav-item" data-workspace="settings">设置</button>
        </nav>
        <div class="sidebar-note">
          <span>右键菜单</span>
          <strong>Prompt / Level Up</strong>
        </div>
      </aside>
      <main id="app" class="main"></main>
    </div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
