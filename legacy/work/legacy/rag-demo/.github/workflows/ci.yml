name: agent-core-ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-tests-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/agent-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Lint import syntax
        run: python -m compileall app tests
      - name: Tests
        run: python -m pytest -q
      - name: Docker build
        run: docker build -t prompt-agent-core:test .
