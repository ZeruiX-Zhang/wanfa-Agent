services:
  data-analyst-agent:
    build: .
    container_name: data-analyst-agent
    env_file:
      - .env.example
    ports:
      - "8780:8780"
    volumes:
      - ./data:/app/data
    command: >
      sh -c "python scripts/init_db.py &&
             uvicorn app.main:app --host 0.0.0.0 --port 8780"

